name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-code:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run scraper and generator
        working-directory: scraper
        run: python src/scraper.py && python src/generator.py

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: |
            api-server/src/generated/methods.rs
            api-server/src/generated/types.rs
            client/src/types/generated/methods.ts
            client/src/types/generated/types.ts
            scraper/output/methods.json
            scraper/output/types.json

  build-web-client:
    needs: generate-code
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client assets
        working-directory: client
        run: npm run build

      - name: Package web assets
        run: |
          mkdir -p dist
          tar -C client/dist -czf dist/simula-web-client.tar.gz .

      - name: Upload web assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-client-dist
          path: dist/simula-web-client.tar.gz

  build-web-bundle:
    needs:
      - generate-code
      - build-web-client
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: .

      - name: Download web assets artifact
        uses: actions/download-artifact@v4
        with:
          name: web-client-dist
          path: incoming/web-client

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            api-server -> target

      - name: Build API server binary
        run: cargo build --manifest-path api-server/Cargo.toml --release

      - name: Package web bundle (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail

          mkdir -p web-bundle/bin web-bundle/web dist
          tar -xzf incoming/web-client/simula-web-client.tar.gz -C web-bundle/web

          cp api-server/target/release/simula-api-server web-bundle/bin/simula-api-server
          chmod +x web-bundle/bin/simula-api-server

          if [ "${{ matrix.platform }}" = "linux" ]; then
            cat > web-bundle/run-web.sh <<'EOF'
#!/usr/bin/env bash
set -euo pipefail

ROOT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
API_BIN="$ROOT_DIR/bin/simula-api-server"

chmod +x "$API_BIN"
export API_HOST=127.0.0.1
export API_PORT=8081
export WEB_APP_PORT=8888
export SIMULA_WEB_DIST_DIR="$ROOT_DIR/web"

if command -v xdg-open >/dev/null 2>&1; then
  xdg-open "http://127.0.0.1:8888" >/dev/null 2>&1 || true
elif command -v open >/dev/null 2>&1; then
  open "http://127.0.0.1:8888" >/dev/null 2>&1 || true
fi

"$API_BIN"
EOF
            chmod +x web-bundle/run-web.sh
            (cd web-bundle && zip -qr ../dist/simula-web-linux.zip .)
          else
            cat > web-bundle/run-web.command <<'EOF'
#!/bin/bash
set -euo pipefail

ROOT_DIR="$(cd "$(dirname "$0")" && pwd)"
API_BIN="$ROOT_DIR/bin/simula-api-server"

chmod +x "$API_BIN"
export API_HOST=127.0.0.1
export API_PORT=8081
export WEB_APP_PORT=8888
export SIMULA_WEB_DIST_DIR="$ROOT_DIR/web"

open "http://127.0.0.1:8888" >/dev/null 2>&1 || true
"$API_BIN"
EOF
            chmod +x web-bundle/run-web.command
            (cd web-bundle && zip -qr ../dist/simula-web-macos.zip .)
          fi

      - name: Package web bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path web-bundle/bin,web-bundle/web,dist -Force | Out-Null

          tar -xzf incoming/web-client/simula-web-client.tar.gz -C web-bundle/web
          Copy-Item api-server/target/release/simula-api-server.exe web-bundle/bin/simula-api-server.exe -Force

          @"
@echo off
setlocal
set ROOT_DIR=%~dp0
set API_BIN=%ROOT_DIR%bin\simula-api-server.exe
set API_HOST=127.0.0.1
set API_PORT=8081
set WEB_APP_PORT=8888
set SIMULA_WEB_DIST_DIR=%ROOT_DIR%web

start "" http://127.0.0.1:8888
"%API_BIN%"
"@ | Set-Content -Path web-bundle/run-web.bat -Encoding ascii

          Compress-Archive -Path web-bundle\* -DestinationPath dist/simula-web-windows.zip -Force

      - name: Upload web bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle-${{ matrix.platform }}
          path: dist/simula-web-${{ matrix.platform }}.zip

  publish-release:
    if: github.event_name == 'release'
    needs: build-web-bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download Linux web bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: web-bundle-linux
          path: release-assets

      - name: Download macOS web bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: web-bundle-macos
          path: release-assets

      - name: Download Windows web bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: web-bundle-windows
          path: release-assets

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.zip
          fail_on_unmatched_files: true
