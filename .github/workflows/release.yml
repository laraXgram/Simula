name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-code:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run scraper and generator
        working-directory: scraper
        run: python src/scraper.py && python src/generator.py

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: |
            api-server/src/generated/methods.rs
            api-server/src/generated/types.rs
            client/src/types/generated/methods.ts
            client/src/types/generated/types.ts
            scraper/output/methods.json
            scraper/output/types.json

  build-desktop:
    needs: generate-code
    runs-on: ${{ matrix.os }}
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: .

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            api-server -> target
            client/src-tauri -> client/src-tauri/target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libjavascriptcoregtk-4.0-dev libwebkit2gtk-4.0-dev libsoup2.4-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build desktop app
        working-directory: client
        run: npm run tauri:build -- --bundles none

      - name: Package Linux desktop artifact
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          mkdir -p dist
          DESKTOP_FILE=$(find client/src-tauri/target -type f \( -name 'simula-desktop' -o -name 'simula_desktop' \) -path '*/release/*' ! -path '*/deps/*' | head -n 1 || true)
          if [ -z "$DESKTOP_FILE" ]; then
            echo "No Linux desktop binary produced"
            find client/src-tauri/target -maxdepth 5 -type f | head -n 200
            exit 1
          fi
          chmod +x "$DESKTOP_FILE"
          zip -j dist/simula-desktop-linux.zip "$DESKTOP_FILE"

      - name: Package macOS desktop artifact
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          mkdir -p dist
          DESKTOP_FILE=$(find client/src-tauri/target -type f \( -name 'simula-desktop' -o -name 'simula_desktop' \) -path '*/release/*' ! -path '*/deps/*' | head -n 1 || true)
          if [ -z "$DESKTOP_FILE" ]; then
            echo "No macOS desktop binary produced"
            find client/src-tauri/target -maxdepth 5 -type f | head -n 200
            exit 1
          fi
          chmod +x "$DESKTOP_FILE"
          zip -j dist/simula-desktop-macos.zip "$DESKTOP_FILE"

      - name: Package Windows desktop artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          $desktopFile = Get-ChildItem -Path client/src-tauri/target -Recurse -File |
            Where-Object {
              ($_.Name -eq 'simula-desktop.exe' -or $_.Name -eq 'simula_desktop.exe') -and
              $_.FullName -match '\\release\\' -and
              $_.FullName -notmatch '\\deps\\'
            } |
            Select-Object -First 1

          if (-not $desktopFile) {
            Write-Host "No Windows desktop binary produced"
            Get-ChildItem -Path client/src-tauri/target -Recurse -File | Select-Object -First 200 FullName
            throw "No Windows desktop binary produced"
          }

          Compress-Archive -Path $desktopFile.FullName -DestinationPath dist/simula-desktop-windows.zip -Force

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: dist/simula-desktop-*.zip

  publish-release:
    if: github.event_name == 'release'
    needs: build-desktop
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download Linux desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-Linux
          path: release-assets

      - name: Download macOS desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-macOS
          path: release-assets

      - name: Download Windows desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-Windows
          path: release-assets

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.zip
          fail_on_unmatched_files: true
