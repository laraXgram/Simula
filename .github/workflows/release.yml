name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-code:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run scraper and generator
        working-directory: scraper
        run: python src/scraper.py && python src/generator.py

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: |
            api-server/src/generated/methods.rs
            api-server/src/generated/types.rs
            client/src/types/generated/methods.ts
            client/src/types/generated/types.ts
            scraper/output/methods.json
            scraper/output/types.json

  quality-gate:
    needs: generate-code
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: .

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint frontend
        working-directory: client
        run: npm run lint

      - name: Build frontend
        working-directory: client
        run: npm run build

      - name: Check backend compilation
        run: cargo check --manifest-path api-server/Cargo.toml

  build-api:
    needs:
      - generate-code
      - quality-gate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: .

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build API server release binary
        run: cargo build --manifest-path api-server/Cargo.toml --release

      - name: Package API binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C api-server/target/release -czf "dist/simula-api-server-${{ runner.os }}-x64.tar.gz" simula-api-server

      - name: Package API binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path api-server/target/release/simula-api-server.exe -DestinationPath dist/simula-api-server-Windows-x64.zip -Force

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-${{ runner.os }}
          path: dist/*

  build-client:
    needs:
      - generate-code
      - quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client assets
        working-directory: client
        run: npm run build

      - name: Package client assets
        run: |
          mkdir -p dist
          tar -C client/dist -czf dist/simula-client-web.tar.gz .

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-web
          path: dist/simula-client-web.tar.gz

  publish-release:
    if: github.event_name == 'release'
    needs:
      - build-api
      - build-client
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
