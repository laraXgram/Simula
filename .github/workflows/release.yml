name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-code:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run scraper and generator
        working-directory: scraper
        run: python src/scraper.py && python src/generator.py

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: |
            api-server/src/generated/methods.rs
            api-server/src/generated/types.rs
            client/src/types/generated/methods.ts
            client/src/types/generated/types.ts
            scraper/output/methods.json
            scraper/output/types.json

  quality-gate:
    needs: generate-code
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: .

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint frontend
        working-directory: client
        run: npm run lint

      - name: Build frontend
        working-directory: client
        run: npm run build

      - name: Check backend compilation
        run: cargo check --manifest-path api-server/Cargo.toml

  build-api:
    needs:
      - generate-code
      - quality-gate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
          - windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: .

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build API server release binary
        run: cargo build --manifest-path api-server/Cargo.toml --release

      - name: Package API binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C api-server/target/release -czf "dist/simula-api-server-${{ runner.os }}-x64.tar.gz" simula-api-server

      - name: Package API binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path api-server/target/release/simula-api-server.exe -DestinationPath dist/simula-api-server-Windows-x64.zip -Force

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-${{ runner.os }}
          path: dist/*

  build-web-dist:
    needs:
      - generate-code
      - quality-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client assets
        working-directory: client
        run: npm run build

      - name: Package client assets
        run: |
          mkdir -p dist
          tar -C client/dist -czf dist/simula-client-web.tar.gz .

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-web
          path: dist/simula-client-web.tar.gz

  package-web:
    needs:
      - build-api
      - build-web-dist
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Download API artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: api-*
          path: incoming/api
          merge-multiple: true

      - name: Download web dist artifact
        uses: actions/download-artifact@v4
        with:
          name: client-web
          path: incoming/client

      - name: Build single web bundle
        run: |
          set -euo pipefail

          mkdir -p dist
          mkdir -p web-bundle/bin/linux web-bundle/bin/macos web-bundle/bin/windows web-bundle/web

          tar -xzf incoming/client/simula-client-web.tar.gz -C web-bundle/web
          tar -xzf incoming/api/simula-api-server-Linux-x64.tar.gz -C web-bundle/bin/linux
          tar -xzf incoming/api/simula-api-server-macOS-x64.tar.gz -C web-bundle/bin/macos
          unzip -q incoming/api/simula-api-server-Windows-x64.zip -d web-bundle/bin/windows

          cat > web-bundle/run-web.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          ROOT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$ROOT_DIR"

          ENV_FILE="$ROOT_DIR/.env"
          DEFAULT_API_HOST="127.0.0.1"
          DEFAULT_API_PORT="8081"
          DEFAULT_DATABASE_URL="simula.db"
          DEFAULT_FILE_STORAGE_DIR="files"
          DEFAULT_LOG_DIR="stdout"

          api_host_value="$DEFAULT_API_HOST"
          api_port_value="$DEFAULT_API_PORT"
          database_url_value="$DEFAULT_DATABASE_URL"
          file_storage_dir_value="$DEFAULT_FILE_STORAGE_DIR"
          log_dir_value="$DEFAULT_LOG_DIR"

          if [ -f "$ENV_FILE" ]; then
            while IFS='=' read -r raw_key raw_value || [ -n "${raw_key:-}" ]; do
              key="${raw_key:-}"
              value="${raw_value:-}"

              key="${key#${key%%[![:space:]]*}}"
              key="${key%${key##*[![:space:]]}}"
              key="${key%$'\r'}"

              value="${value#${value%%[![:space:]]*}}"
              value="${value%${value##*[![:space:]]}}"
              value="${value%$'\r'}"

              case "$key" in
                API_HOST) api_host_value="$value" ;;
                API_PORT) api_port_value="$value" ;;
                DATABASE_URL) database_url_value="$value" ;;
                FILE_STORAGE_DIR) file_storage_dir_value="$value" ;;
                LOG_DIR) log_dir_value="$value" ;;
              esac
            done < "$ENV_FILE"
          fi

          if [ -n "${API_HOST:-}" ]; then
            api_host_value="$API_HOST"
          fi
          if [ -n "${API_PORT:-}" ]; then
            api_port_value="$API_PORT"
          fi

          [ -n "$api_host_value" ] || api_host_value="$DEFAULT_API_HOST"
          [ -n "$api_port_value" ] || api_port_value="$DEFAULT_API_PORT"
          [ -n "$database_url_value" ] || database_url_value="$DEFAULT_DATABASE_URL"
          [ -n "$file_storage_dir_value" ] || file_storage_dir_value="$DEFAULT_FILE_STORAGE_DIR"
          [ -n "$log_dir_value" ] || log_dir_value="$DEFAULT_LOG_DIR"

          cat > "$ENV_FILE" <<ENVEOF
          API_HOST=$api_host_value
          API_PORT=$api_port_value
          DATABASE_URL=$database_url_value
          FILE_STORAGE_DIR=$file_storage_dir_value
          LOG_DIR=$log_dir_value
          ENVEOF

          export API_HOST="$api_host_value"
          export API_PORT="$api_port_value"
          export DATABASE_URL="$database_url_value"
          export FILE_STORAGE_DIR="$file_storage_dir_value"
          export LOG_DIR="$log_dir_value"

          case "$(uname -s)" in
            Linux*) API_BIN="$ROOT_DIR/bin/linux/simula-api-server" ;;
            Darwin*) API_BIN="$ROOT_DIR/bin/macos/simula-api-server" ;;
            *)
              echo "Unsupported OS for run-web.sh"
              exit 1
              ;;
          esac

          chmod +x "$API_BIN"
          export SIMULA_WEB_DIST_DIR="${SIMULA_WEB_DIST_DIR:-$ROOT_DIR/web}"

          OPEN_API_HOST="$api_host_value"
          if [ "$OPEN_API_HOST" = "0.0.0.0" ] || [ "$OPEN_API_HOST" = "::" ]; then
            OPEN_API_HOST="127.0.0.1"
          fi
          WEB_URL="http://127.0.0.1:8888/?api_host=${OPEN_API_HOST}&api_port=${api_port_value}"

          "$API_BIN" &
          API_PID=$!
          trap 'kill "$API_PID" 2>/dev/null || true' EXIT

          if command -v xdg-open >/dev/null 2>&1; then
            xdg-open "$WEB_URL" >/dev/null 2>&1 || true
          elif command -v open >/dev/null 2>&1; then
            open "$WEB_URL" >/dev/null 2>&1 || true
          fi

          wait "$API_PID"
          EOF

          cat > web-bundle/run-web.bat <<'EOF'
          @echo off
          setlocal EnableExtensions EnableDelayedExpansion
          set ROOT_DIR=%~dp0
          cd /d "%ROOT_DIR%"

          set ENV_FILE=%ROOT_DIR%.env

          set E_API_HOST=127.0.0.1
          set E_API_PORT=8081
          set E_DATABASE_URL=simula.db
          set E_FILE_STORAGE_DIR=files
          set E_LOG_DIR=stdout

          if exist "%ENV_FILE%" (
            for /f "usebackq tokens=1,* delims==" %%A in ("%ENV_FILE%") do (
              if /I "%%A"=="API_HOST" set E_API_HOST=%%B
              if /I "%%A"=="API_PORT" set E_API_PORT=%%B
              if /I "%%A"=="DATABASE_URL" set E_DATABASE_URL=%%B
              if /I "%%A"=="FILE_STORAGE_DIR" set E_FILE_STORAGE_DIR=%%B
              if /I "%%A"=="LOG_DIR" set E_LOG_DIR=%%B
            )
          )

          if not "%API_HOST%"=="" set E_API_HOST=%API_HOST%
          if not "%API_PORT%"=="" set E_API_PORT=%API_PORT%

          > "%ENV_FILE%" (
            echo API_HOST=%E_API_HOST%
            echo API_PORT=%E_API_PORT%
            echo DATABASE_URL=%E_DATABASE_URL%
            echo FILE_STORAGE_DIR=%E_FILE_STORAGE_DIR%
            echo LOG_DIR=%E_LOG_DIR%
          )

          set API_HOST=%E_API_HOST%
          set API_PORT=%E_API_PORT%
          set DATABASE_URL=%E_DATABASE_URL%
          set FILE_STORAGE_DIR=%E_FILE_STORAGE_DIR%
          set LOG_DIR=%E_LOG_DIR%

          set API_BIN=%ROOT_DIR%bin\windows\simula-api-server.exe
          if "%SIMULA_WEB_DIST_DIR%"=="" set SIMULA_WEB_DIST_DIR=%ROOT_DIR%web

          set OPEN_API_HOST=%API_HOST%
          if "%OPEN_API_HOST%"=="0.0.0.0" set OPEN_API_HOST=127.0.0.1
          if "%OPEN_API_HOST%"=="::" set OPEN_API_HOST=127.0.0.1

          start "" "http://127.0.0.1:8888/?api_host=%OPEN_API_HOST%&api_port=%API_PORT%"
          "%API_BIN%"
          EOF

          chmod +x web-bundle/run-web.sh

          (
            cd web-bundle
            zip -qr ../dist/simula-web.zip .
          )

      - name: Upload packaged web bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: dist/simula-web.zip

  publish-release:
    if: github.event_name == 'release'
    needs:
      - package-web
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Download web bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: release-assets

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.zip
          fail_on_unmatched_files: true